<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<title>Краеград v5</title>
	<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #e8f4ff;
	background-color: #070911;
	overflow: hidden;
	touch-action: none;
	-webkit-touch-callout: none;
	-webkit-user-select: none;
	user-select: none;
	font-family: "Segoe UI", "Noto Sans", "Droid Sans", Arial, sans-serif;
}

#canvas {
	display: block;
	touch-action: none;
}

#canvas:focus {
	outline: none;
}

#status, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status {
	top: 0;
	bottom: 0;
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
	padding: 1.5rem;
	box-sizing: border-box;
}

#loader-brand {
	max-width: 34rem;
	width: 100%;
	text-align: center;
	margin-bottom: 2.5rem;
}

#loader-title {
	margin: 0 0 0.35rem;
	font-size: clamp(2rem, 8vw, 3rem);
	font-weight: 600;
	color: #66d1ff;
	letter-spacing: 0.02em;
}

#loader-version {
	color: #8ec8e8;
	font-weight: 500;
	font-size: 0.72em;
}

#loader-tagline {
	margin: 0 0 1.25rem;
	font-size: clamp(0.95rem, 3.5vw, 1.125rem);
	color: rgba(140, 184, 217, 0.92);
}

#loader-tip-wrap {
	min-height: 4.5rem;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0.85rem 1rem;
	border: 1px solid rgba(64, 96, 120, 0.55);
	border-radius: 0.5rem;
	background: rgba(12, 18, 28, 0.72);
}

#loader-tip {
	margin: 0;
	font-size: clamp(0.9rem, 3.2vw, 1rem);
	line-height: 1.45;
	color: rgba(200, 224, 245, 0.95);
	transition: opacity 0.3s ease;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 8%;
	width: min(22rem, 72vw);
	height: 0.55rem;
	margin: 0 auto;
	accent-color: #66d1ff;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

</head>
<body>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<noscript>
		Your browser does not support JavaScript.
	</noscript>

	<div id="status">
		<div id="loader-brand">
			<h1 id="loader-title">Краеград <span id="loader-version">v5</span></h1>
			<p id="loader-tagline">Война владений туманного Морвена</p>
			<div id="loader-tip-wrap">
				<p id="loader-tip"></p>
			</div>
		</div>
		<progress id="status-progress"></progress>
		<div id="status-notice"></div>
	</div>

	<script src="index.js"></script>
	<script>
const LOADING_TIPS = ["Цель — уничтожить Владыку соперника. Погибнет Владыка — правитель выбывает.","Щиты защищают владение: без них узел быстро падает при атаке.","Армии ходят только по дорогам — планируйте маршрут заранее.","Туман войны скрывает чужие земли. Дозор и союзы расширяют обзор.","Улучшайте деревни до казарм и крепостей — так растёт мощь владений.","На границе можно предложить союз: общий туман, но после разрыва — перемирие.","Захватив вражеский пост, его автоотправка сбрасывается — настройте заново.","Каждый матч — новая карта Морвена, число узлов и характер соперников.","Крепостной вал — самый быстрый набор щитов. Тыл без вала — приглашение к гостям.","Бастион ослабляет камнемёт. Стройте его там, где соседи слишком любят камни.","Катапульта оглушает владение: ~60 секунд без набора и щитов. Владелец в это время только смотрит.","Чумной колодец летит напрямую. Соседи после него перестают здороваться по дорогам.","Всевидящее око снимает туман на всей карте. Шпионить стало слишком честно.","Цитадель владыки не глушится катапультой — Владыка упрямее, чем кажется.","Нейтральные казармы не ждут вечно. Захватите их, пока бот не опередил.","Shift при отправке — часть гарнизона. Ctrl — половина. Жадность — классика Морвена.","Держите Владыку в тылу. Героически погибнуть можно в следующем матче.","Союзник видит ваш туман. После разрыва снова слепите друг друга — как в первый день.","Без щитов узел падает быстрее, чем оправдания после поражения.","Автоотправка не спит. В отличие от правителя, который забыл провести линию снабжения.","Отдалите камеру — точки на карте. Приблизьте — и станет ясно, кто забыл про щиты.","Болезнь из чумного колодца не обходит бои на дорогах — остановите её заранее.","Перемирие после разрыва союза — время поплакать и перестроить оборону.","Касание — выбор владения. Перетаскивание — атака.","Долгое нажатие на казарму — автоотправка по дорогам.","Пустое место на карте — панорама. Щипок двумя пальцами — зум.","WASD — камера на ПК. Колёсико — зум к курсору.","ПКМ с казармы — линия автоотправки. R — показать линии снабжения."];
const TIP_INTERVAL_MS = 6500;

(function initLoadingTips() {
	const tipEl = document.getElementById('loader-tip');
	if (!tipEl || !Array.isArray(LOADING_TIPS) || LOADING_TIPS.length === 0) {
		return;
	}
	let tipIndex = Math.floor(Math.random() * LOADING_TIPS.length);
	const showTip = (animate) => {
		if (animate) {
			tipEl.style.opacity = '0';
			window.setTimeout(() => {
				tipEl.textContent = LOADING_TIPS[tipIndex];
				tipEl.style.opacity = '1';
				tipIndex = (tipIndex + 1) % LOADING_TIPS.length;
			}, 280);
		} else {
			tipEl.textContent = LOADING_TIPS[tipIndex];
			tipIndex = (tipIndex + 1) % LOADING_TIPS.length;
		}
	};
	showTip(false);
	window.setInterval(() => showTip(true), TIP_INTERVAL_MS);
})();

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":358060,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
	</script>
</body>
</html>
